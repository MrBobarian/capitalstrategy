// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData(state){
  const blob=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),...state},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="capital-protocol-data.json";a.click();URL.revokeObjectURL(url);
}
function importData(e,setters){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.salaryHistory)setters.setSalaryHistory(d.salaryHistory);
      if(d.freelanceHistory)setters.setFreelanceHistory(d.freelanceHistory);
      if(d.accounts)setters.setAccounts(d.accounts);
      if(d.btcExit)setters.setBtcExit(d.btcExit);
      if(d.mstrExit)setters.setMstrExit(d.mstrExit);
      if(d.assumptions)setters.setA(d.assumptions);
      if(d.signalOverrides)setters.setSignalOverrides(d.signalOverrides);
      if(d.manualFlags)setters.setManualFlags(d.manualFlags);
      alert("Imported successfully.");
    }catch(err){alert("Import failed: "+err.message);}
    e.target.value="";
  };
  reader.readAsText(file);
}

// ── PROJECTION ENGINE ────────────────────────────────────────────────────────
function runProjection(accounts,a,months,salaryHistory,freelanceHistory){
  const scenarios={
    bear:{eq:a.bearEquity/100,btcMult:a.bearBTC,mstrMult:a.bearMSTR},
    base:{eq:a.baseEquity/100,btcMult:a.baseBTC,mstrMult:a.baseMSTR},
    bull:{eq:a.bullEquity/100,btcMult:a.bullBTC,mstrMult:a.bullMSTR},
  };
  function getInvestable(m){
    const sorted=[...salaryHistory].sort((a,b)=>a.month-b.month);
    let cur=sorted[0];
    for(const s of sorted){if(s.month<=m)cur=s;else break;}
    return Math.max(0,cur.netSalary-cur.fixedCosts);
  }
  function getFL(yr){const e=freelanceHistory.find(e=>e.year===yr);return e?e.amount:0;}
  const all=[];
  for(const[sk,s]of Object.entries(scenarios)){
    let ask=accounts.ask,nord=accounts.nordnetPension,dan=accounts.danicaPension;
    let ald=accounts.aldersopsparing,btc=accounts.btc,mstr=accounts.mstr||0;
    let tax=accounts.taxable,liq=accounts.liquidSavings;
    let askDep=0;
    for(let m=0;m<=months;m++){
      const mo=m%12;const calYear=2026+Math.floor(m/12);
      const mr=Math.pow(1+s.eq,1/12)-1;const bmr=Math.pow(1+s.eq*0.65,1/12)-1;
      ask*=1+mr;nord*=1+mr;dan*=1+mr;ald*=1+mr;tax*=1+mr;btc*=1+bmr;mstr*=1+bmr;
      if(m===24){btc*=s.btcMult;mstr*=s.mstrMult;}
      nord+=a.pensionMonthly;dan+=a.employerPension;ald+=8900/12;
      const inv=getInvestable(m);
      const room=Math.max(0,a.askTotalLimit-askDep);
      const dep=Math.min(Math.min(a.askMonthly,inv),room);
      ask+=dep;askDep+=dep;
      btc+=(Math.min(a.askMonthly,inv)-dep)*0.7;
      if(mo===5){const fl=getFL(calYear);const toAsk=Math.min(fl,Math.max(0,a.askTotalLimit-askDep));ask+=toAsk;askDep+=toAsk;btc+=(fl-toAsk)*0.7;}
      liq+=a.apartmentMonthly;
      const total=ask+nord+dan+ald+btc+mstr+tax+liq;
      if(m%3===0||m===months){
        const yr=2026+Math.floor(m/12);
        all.push({m,scenario:sk,label:mo===0?`${yr}`:mo===6?`${yr}.5`:"",total:Math.round(total)});
      }
    }
  }
  return all;
}
function getMerged(data){
  return[...new Set(data.map(d=>d.m))].map(m=>{
    const b=data.find(d=>d.m===m&&d.scenario==="bear");
    const ba=data.find(d=>d.m===m&&d.scenario==="base");
    const bu=data.find(d=>d.m===m&&d.scenario==="bull");
    return{m,label:(ba&&ba.label)||"",bear:(b&&b.total)||0,base:(ba&&ba.total)||0,bull:(bu&&bu.total)||0};
  });
}

// ── DONUT CHART ──────────────────────────────────────────────────────────────
function Pie2({data}){
  const size=90,cx=45,cy=45,r=32,ri=19,circ=2*Math.PI*r;
  let offset=0;
  const slices=data.map(d=>{const s={...d,offset,dash:(d.value/100)*circ};offset+=s.dash;return s;});
  return(
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      <svg width={size} height={size} style={{flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.dim} strokeWidth={r-ri}/>
        {slices.map((s,i)=>(
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={r-ri}
            strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={circ/4-s.offset}/>
        ))}
      </svg>
      <div style={{flex:1}}>
        {data.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
            <span style={{width:6,height:6,borderRadius:1.5,background:d.color,flexShrink:0,display:"inline-block"}}/>
            <span style={{color:C.muted,fontSize:9,fontFamily:"'JetBrains Mono',monospace",flex:1}}>{d.label}</span>
            <span style={{color:d.color,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{d.value}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── SVG LINE CHART ───────────────────────────────────────────────────────────
function SVGLineChart({data,target=1000000}){
  const W=700,H=200,PL=55,PR=20,PT=14,PB=30;
  const cw=W-PL-PR,ch=H-PT-PB;
  if(!data||!data.length)return null;
  const maxVal=Math.max(...data.map(d=>d.bull),target)*1.08;
  const minVal=0;
  const xOf=i=>(i/(data.length-1))*cw+PL;
  const yOf=v=>ch-((v-minVal)/(maxVal-minVal))*ch+PT;
  const line=key=>data.map((d,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(d[key]).toFixed(1)}`).join(" ");
  const area=key=>`${line(key)} L${xOf(data.length-1)},${H-PB} L${PL},${H-PB} Z`;
  const yTicks=[0,250000,500000,750000,1000000,1250000].filter(v=>v<=maxVal*1.05);
  const labeled=data.filter(d=>d.label);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      <defs>
        <linearGradient id="gbull" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.green} stopOpacity="0.18"/><stop offset="100%" stopColor={C.green} stopOpacity="0.01"/></linearGradient>
        <linearGradient id="gbase" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gold} stopOpacity="0.14"/><stop offset="100%" stopColor={C.gold} stopOpacity="0.01"/></linearGradient>
        <linearGradient id="gbear" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.red} stopOpacity="0.1"/><stop offset="100%" stopColor={C.red} stopOpacity="0.01"/></linearGradient>
      </defs>
      {yTicks.map((v,i)=>(
        <g key={i}>
          <line x1={PL} y1={yOf(v)} x2={W-PR} y2={yOf(v)} stroke={C.border} strokeWidth="0.5" strokeDasharray={v===target?"4 3":"none"}/>
          <text x={PL-6} y={yOf(v)+4} textAnchor="end" fill={v===target?C.gold:C.muted} fontSize="7" fontFamily="'JetBrains Mono',monospace">{v>=1000000?`${v/1000000}M`:`${v/1000}k`}</text>
          {v===target&&<text x={W-PR+3} y={yOf(v)+4} fill={C.gold} fontSize="7" fontFamily="'JetBrains Mono',monospace">1M</text>}
        </g>
      ))}
      <path d={area("bull")} fill="url(#gbull)"/>
      <path d={area("base")} fill="url(#gbase)"/>
      <path d={area("bear")} fill="url(#gbear)"/>
      <path d={line("bull")} fill="none" stroke={C.green} strokeWidth="1.5" strokeDasharray="4 2"/>
      <path d={line("base")} fill="none" stroke={C.gold} strokeWidth="2"/>
      <path d={line("bear")} fill="none" stroke={C.red} strokeWidth="1.5" strokeDasharray="4 2"/>
      {labeled.map((d,i)=>{const xi=data.indexOf(d);return(<text key={i} x={xOf(xi)} y={H-PB+12} textAnchor="middle" fill={C.muted} fontSize="8" fontFamily="'JetBrains Mono',monospace">{d.label}</text>);})}
    </svg>
  );
}

// ── REGIME ENGINE COMPONENT ──────────────────────────────────────────────────
function RegimeEngine({signalOverrides,setSignalOverrides,manualFlags,setManualFlags}){
  const[selected,setSelected]=useState(null);
  const[lastUpdated]=useState(()=>load("cs_sig_updated","Never"));

  const getVal=id=>{
    const def=SIGNAL_DEFS.find(s=>s.id===id);
    return signalOverrides[id]!==undefined?signalOverrides[id]:def.defaultVal;
  };
  const setVal=(id,v)=>setSignalOverrides(p=>({...p,[id]:v}));

  const getColor=(sig,val)=>{
    for(const t of sig.thresholds)if(val>=t.v)return t.c;
    return "neutral";
  };
  const dotColor=c=>c==="green"?C.green:c==="amber"?C.amber:c==="red"?C.red:C.muted;

  const regimeScore=Math.round(SIGNAL_DEFS.reduce((s,sig)=>{
    const v=getVal(sig.id);return s+(sig.score(v)*sig.weight)/100;
  },0));

  const regime=REGIMES.find(r=>regimeScore>=r.min)||REGIMES[REGIMES.length-1];
  const regimeColor=regime.cls==="green"?C.green:regime.cls==="amber"?C.amber:C.red;

  const acc=load("cs_alloc_acc","ask");
  const adj=ACC_ADJ[acc]||ACC_ADJ.ask;
  const raw={acwi:regime.acwi+adj.acwi,nasdaq:regime.nasdaq+adj.nasdaq,semi:Math.max(0,regime.semi+adj.semi)};
  const tot=raw.acwi+raw.nasdaq+raw.semi;
  const alloc={acwi:Math.round(raw.acwi/tot*100),nasdaq:Math.round(raw.nasdaq/tot*100),semi:100-Math.round(raw.acwi/tot*100)-Math.round(raw.nasdaq/tot*100)};

  // Hormuz risk flag
  const hormuzDays=manualFlags.hormuzDays||0;
  const hormuzActive=manualFlags.hormuzActive||false;
  const semiOverride=hormuzActive&&hormuzDays>=35;

  // Flags
  const flags=[];
  const liqV=getVal("liq");const ismV=getVal("ism");const kV=getVal("korea");
  const infV=getVal("inflation");const sofrV=getVal("sofr");const soxV=getVal("sox");
  if(liqV<5.9)flags.push({t:"amber",msg:`Liquidity ${liqV.toFixed(2)}T below pain threshold. Watch TGA drawdown + eSLR reform for recovery (target: ~5.9T).`});
  else flags.push({t:"green",msg:`Liquidity above threshold — risk asset tailwind intact.`});
  if(sofrV>3)flags.push({t:"red",msg:`SOFR-EFFR spread elevated (+${sofrV}bps) — hedge fund de-grossing, leverage-sensitive assets (BTC/MSTR) vulnerable.`});
  else if(sofrV<=0)flags.push({t:"green",msg:`SOFR-EFFR back below 0 — leverage conditions normalised. Re-grossing window open when Hormuz resolves.`});
  if(kV<0)flags.push({t:"amber",msg:`Korea exports negative (${kV.toFixed(1)}% YoY) — ISM may soften in 4–8 weeks. Do not expand SEMI ahead of confirmation.`});
  else flags.push({t:"green",msg:`Korea exports positive — SEMI cycle lead signal intact.`});
  if(ismV>=52)flags.push({t:"green",msg:`ISM in expansion (${ismV.toFixed(1)}) — SEMI capex cycle confirmed.`});
  else if(ismV>=48)flags.push({t:"amber",msg:`ISM neutral zone (${ismV.toFixed(1)}) — hold SEMI, await expansion confirmation.`});
  else flags.push({t:"red",msg:`ISM contraction (${ismV.toFixed(1)}) — reduce SEMI to defensive floor.`});
  if(infV<=-0.05)flags.push({t:"green",msg:`CPI/PCE spread declining — inflation falling. Ideal backdrop for NASDAQ-100 and SEMI multiples.`});
  else if(infV>0.05)flags.push({t:"red",msg:`Inflation re-accelerating. Distinguish supply-shock (Hormuz) vs demand-pull. Apply higher penalty if commodity-driven.`});
  if(soxV>=1.0)flags.push({t:"green",msg:`SOX outperforming SPX — semiconductor momentum confirmed by price action.`});
  else flags.push({t:"amber",msg:`SOX underperforming SPX — SEMI expansion not yet confirmed. Wait for price momentum before adding.`});
  if(semiOverride)flags.push({t:"red",msg:`⚠ HORMUZ OVERRIDE: Day ${hormuzDays}/45 — helium vulnerability active. SEMI hard-capped at defensive floor regardless of signal score.`});

  const selDef=selected?SIGNAL_DEFS.find(s=>s.id===selected):null;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* Liquidity Flag Banner */}
      <div className={`card ${liqV>=5.9?"card-green":"card-red"}`} style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Dot color={liqV>=5.9?C.green:liqV>=5.7?C.amber:C.red} size={10} pulse={liqV<5.9}/>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
              <span style={{color:C.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>STENO LIQUIDITY FLAG</span>
              <Pill label={liqV>=5.9?"ABOVE THRESHOLD":liqV>=5.7?"APPROACHING":"BELOW PAIN"} color={liqV>=5.9?C.green:liqV>=5.7?C.amber:C.red}/>
              {hormuzActive&&<Pill label={`HORMUZ DAY ${hormuzDays}`} color={C.red}/>}
            </div>
            <p style={{color:C.muted,fontSize:9,lineHeight:1.6}}>
              {liqV>=5.9
                ?"Reserves above threshold. SOFR-EFFR normalised. eSLR reform lowers effective pain level post-Apr 2026. Risk asset tailwind intact — leverage re-entry window open."
                :liqV>=5.7
                ?"Reserves approaching threshold. TGA drawdown + ~$40bn/mo reserve management purchases = recovery path. Seasonal tailwind Apr. Monitor weekly."
                :"Reserves below pain level. Funding stress risk. Wait for TGA drawdown + eSLR to lift reserves before expanding high-beta positions."}
              {hormuzActive&&` Hormuz crisis (Day ${hormuzDays}): supply-shock inflation, external USD tightening. Domestic US liquidity improving but global dollar funding weakening.`}
            </p>
          </div>
          <div style={{textAlign:"right"}}>
            <div className="num" style={{color:liqV>=5.9?C.green:C.amber,fontSize:28}}>{liqV.toFixed(2)}</div>
            <div className="lbl" style={{marginBottom:0}}>T USD reserves</div>
          </div>
        </div>
      </div>

      {/* Signal Stack */}
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <Lbl style={{marginBottom:0}}>Signal Stack — 8 Signals · Steno-Aligned</Lbl>

            <span style={{color:C.muted,fontSize:9}}>Click signal to edit value</span>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>

            const v=getVal(sig.id);
